services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CARPARTPICKER_BUILD_STORAGE_MODE: postgres
      CARPARTPICKER_POSTGRES_URL: postgresql+psycopg://postgres:postgres@postgres:5432/carpartpicker
      CARPARTPICKER_REDIS_URL: redis://redis:6379/0
      CARPARTPICKER_OPENSEARCH_URL: http://opensearch:9200
      CARPARTPICKER_S3_ENDPOINT_URL: http://minio:9000
      CARPARTPICKER_S3_BUCKET: carpartpicker-assets
      CARPARTPICKER_NEO4J_URI: bolt://neo4j:7687
      CARPARTPICKER_NEO4J_USERNAME: neo4j
      CARPARTPICKER_NEO4J_PASSWORD: password
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: python -m app.worker
    restart: on-failure
    environment:
      CARPARTPICKER_BUILD_STORAGE_MODE: postgres
      CARPARTPICKER_POSTGRES_URL: postgresql+psycopg://postgres:postgres@postgres:5432/carpartpicker
      CARPARTPICKER_REDIS_URL: redis://redis:6379/0
      CARPARTPICKER_OPENSEARCH_URL: http://opensearch:9200
      CARPARTPICKER_S3_ENDPOINT_URL: http://minio:9000
      CARPARTPICKER_S3_BUCKET: carpartpicker-assets
      CARPARTPICKER_NEO4J_URI: bolt://neo4j:7687
      CARPARTPICKER_NEO4J_USERNAME: neo4j
      CARPARTPICKER_NEO4J_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: carpartpicker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carpartpicker"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: CarPartPickerDevAdmin123!
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  neo4j:
    image: neo4j:5.22
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

volumes:
  postgres-data:
  opensearch-data:
  minio-data:
  neo4j-data:

