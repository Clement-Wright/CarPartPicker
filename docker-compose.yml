version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      CARPARTPICKER_BUILD_STORAGE_MODE: postgres
      CARPARTPICKER_POSTGRES_URL: postgresql+psycopg://postgres:postgres@postgres:5432/carpartpicker
      CARPARTPICKER_REDIS_URL: redis://redis:6379/0
      CARPARTPICKER_OPENSEARCH_URL: http://opensearch:9200
      CARPARTPICKER_S3_ENDPOINT_URL: http://minio:9000
      CARPARTPICKER_S3_BUCKET: carpartpicker-assets
      CARPARTPICKER_NEO4J_URI: bolt://neo4j:7687
      CARPARTPICKER_NEO4J_USERNAME: neo4j
      CARPARTPICKER_NEO4J_PASSWORD: password
    depends_on:
      - postgres
      - redis
      - opensearch
      - minio

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: python -m app.worker
    environment:
      CARPARTPICKER_BUILD_STORAGE_MODE: postgres
      CARPARTPICKER_POSTGRES_URL: postgresql+psycopg://postgres:postgres@postgres:5432/carpartpicker
      CARPARTPICKER_REDIS_URL: redis://redis:6379/0
      CARPARTPICKER_OPENSEARCH_URL: http://opensearch:9200
      CARPARTPICKER_S3_ENDPOINT_URL: http://minio:9000
      CARPARTPICKER_S3_BUCKET: carpartpicker-assets
      CARPARTPICKER_NEO4J_URI: bolt://neo4j:7687
      CARPARTPICKER_NEO4J_USERNAME: neo4j
      CARPARTPICKER_NEO4J_PASSWORD: password
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: carpartpicker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  neo4j:
    image: neo4j:5.22
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

volumes:
  postgres-data:
  opensearch-data:
  minio-data:
  neo4j-data:

