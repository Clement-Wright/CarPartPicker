version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      CATAPULT_POSTGRES_URL: postgresql+psycopg://postgres:postgres@postgres:5432/catapult
      CATAPULT_NEO4J_URI: bolt://neo4j:7687
      CATAPULT_NEO4J_USERNAME: neo4j
      CATAPULT_NEO4J_PASSWORD: password
    depends_on:
      - postgres
      - neo4j

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: python -m app.worker
    environment:
      CATAPULT_POSTGRES_URL: postgresql+psycopg://postgres:postgres@postgres:5432/catapult
      CATAPULT_NEO4J_URI: bolt://neo4j:7687
      CATAPULT_NEO4J_USERNAME: neo4j
      CATAPULT_NEO4J_PASSWORD: password
    depends_on:
      - postgres
      - neo4j

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: catapult
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.22
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

volumes:
  postgres-data:
  neo4j-data:

